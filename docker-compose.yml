services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smk
      POSTGRES_PASSWORD: smk
      POSTGRES_DB: smk
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smk"]
      interval: 5s
      retries: 10

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  pg_data:
